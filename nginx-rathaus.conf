# GRCA Application Nginx Configuration
# For: rathaus.vineta.ca
# Add this location block to your existing server configuration
# File: /etc/nginx/sites-available/rathaus.vineta.ca
#
# After adding this block, test and reload nginx:
#   sudo nginx -t
#   sudo systemctl reload nginx

    # ========================================================================
    # GRCA Application - https://rathaus.vineta.ca/grca/
    # ========================================================================
    
    location /grca/ {
        # Strip the /grca prefix when proxying to Sinatra/Thin
        rewrite ^/grca/(.*) /$1 break;
        
        # Proxy to Thin web server (running on port 4567)
        proxy_pass http://127.0.0.1:4567;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical: Set SCRIPT_NAME so the app generates correct URLs
        # This tells the app it's running under /grca/ path
        proxy_set_header SCRIPT_NAME /grca;
        
        # WebSocket support (future-proofing)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
