# Nginx Configuration Example for GRCA App
# Copy this configuration to your nginx sites-available directory
# and adjust the paths as needed

# Option 1: Deploy as a subdirectory (e.g., /grca/)
# This allows the GRCA app to coexist with other web applications

server {
    listen 80;
    server_name your-domain.com;

    # Your existing web root
    root /var/www/html;

    # Other existing configurations...

    # GRCA App - deploy under /grca path
    location /grca/ {
        # Strip the /grca prefix when proxying to Sinatra
        rewrite ^/grca/(.*) /$1 break;
        
        # Proxy to Sinatra app (running on port 4567)
        proxy_pass http://127.0.0.1:4567;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important: Set SCRIPT_NAME so the app knows its base path
        proxy_set_header SCRIPT_NAME /grca;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Option 2: Deploy at root level (dedicated subdomain)
# Use this if grca.your-domain.com is the only app

server {
    listen 80;
    server_name grca.your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:4567;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No SCRIPT_NAME needed when deployed at root
        proxy_set_header SCRIPT_NAME "";
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
