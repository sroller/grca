# Nginx Configuration for GRCA App
# For deployment under /grca path on rathaus.vineta.ca
# 
# Add this location block to your existing server block in:
# /etc/nginx/sites-available/rathaus.vineta.ca (or wherever your main config is)

# Copy the location block below into your existing SSL server block (the one listening on 443)

    # GRCA Application - accessible at https://rathaus.vineta.ca/grca/
    location /grca/ {
        # Strip the /grca prefix when proxying to Sinatra
        rewrite ^/grca/(.*) /$1 break;
        
        # Proxy to Thin web server (running on port 4567)
        proxy_pass http://127.0.0.1:4567;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important: Set SCRIPT_NAME so the app knows its base path
        # This allows the app to generate correct URLs under /grca/
        proxy_set_header SCRIPT_NAME /grca;
        
        # Also set REQUEST_URI to help with redirects
        proxy_set_header REQUEST_URI $uri;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

# That's it! Your existing SSL/TLS configuration will handle encryption.
# HTTP to HTTPS redirect is already handled by your main server config.
# No need for a separate server block for the GRCA app.
